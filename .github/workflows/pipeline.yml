name: LitOrbit Daily Pipeline Trigger

# Triggers the pipeline on the LitOrbit Render backend (Singapore region,
# which is supported by the Gemini API). All real work runs there; this
# workflow is just a scheduler that fires an authenticated HTTP request.

on:
  schedule:
    - cron: '30 20 * * *'  # 06:00 ACST = 20:30 UTC
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST run-scheduled
        env:
          API_URL: ${{ secrets.LITORBIT_API_URL }}
          PIPELINE_SECRET: ${{ secrets.PIPELINE_TRIGGER_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${API_URL:-}" || -z "${PIPELINE_SECRET:-}" ]]; then
            echo "Missing LITORBIT_API_URL or PIPELINE_TRIGGER_SECRET secret" >&2
            exit 1
          fi
          # Render free dynos cold-start (~30-60s). Use a generous connect
          # timeout and retry the wake-up. The endpoint runs synchronously
          # and returns the result when done (pipeline + digest).
          # Scoring is rate-limited by Gemini (9 RPM free tier), so
          # 170+ papers can take 30-40 min. Give a 1-hour budget.
          curl --fail-with-body \
               --retry 3 --retry-delay 15 --retry-connrefused \
               --connect-timeout 90 \
               --max-time 3600 \
               -X POST \
               -H "X-Pipeline-Secret: ${PIPELINE_SECRET}" \
               -H "Content-Type: application/json" \
               "${API_URL%/}/api/v1/admin/pipeline/run-scheduled"
          echo
          echo "Pipeline + digest run complete."
